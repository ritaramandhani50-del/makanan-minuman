<!DOCTYPE html>
<html>
<head>
<title>Welcome - Flavora Food</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5e6d3;
}

/* ===== WELCOME SECTION ===== */

.welcome-section{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
background-size:cover;
background-position:center;
}

.welcome-box{
background:rgba(255,255,255,0.9);
padding:50px;
border-radius:15px;
text-align:center;
max-width:600px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.welcome-box h1{
font-size:40px;
color:#5d4037;
margin-bottom:20px;
}

.welcome-box p{
font-size:16px;
color:#444;
margin-bottom:25px;
line-height:1.6;
}

.welcome-btn{
background:#8d6e63;
color:white;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.welcome-btn:hover{
background:#4e342e;
transform:scale(1.05);
}

</style>

</head>

<body>

<section class="welcome-section">

<div class="welcome-box">

<h1>Welcome to Flavora Food 🍽</h1>

<p>
Selamat datang di Flavora Food!  
Nikmati berbagai makanan lezat dengan rasa terbaik dan kualitas pilihan.  
Kami menghadirkan hidangan yang hangat, nikmat, dan siap memanjakan selera Anda.
</p>

<a href="toko makanan.html" class="welcome-btn">GO &#8594;</a>

</div>

</section>

</body>
</html>
